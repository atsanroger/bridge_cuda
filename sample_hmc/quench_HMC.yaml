# Quenched (pure-gauge) HMC — generate a REAL non-tiled 16^4 SU(3) config.

Main:
  lattice_size             : [12,12,12,12]
  grid_size                : []
  number_of_thread         : 16
  number_of_color          : 3
  log_filename             : stdout
  ildg_log_filename        : stdout
  verbose_level            : General

Test_HMC_Wilson:
  ## gauge_config_status = {Continue,Cold_start,Hot_start}
  gauge_config_status      : Cold_start
  gauge_config_type_input  : Text
  config_filename_input    : ./conf_04040408.txt
  gauge_config_type_output : Text
  config_filename_output   : ./conf_quench_12x12x12x12.txt
  random_number_type       : Mseries
  seed_for_random_number   : 20260606UL
  trajectory_number        : 0
  trajectory_number_step   : 200
  save_config_interval     : 25
  verbose_level            : General

HMC_Leapfrog:
  ## traj_length = number_of_steps * step_size
  step_size       : 0.0015
  number_of_steps : 200
  order_of_exp_iP : 8
  Metropolis_test : true
  verbose_level   : General

Action_G:
  ## action_type = {Action_G_Plaq,Action_G_Rectangle}
  action_type   : Action_G_Plaq
  beta          : 5.7
  verbose_level : General
