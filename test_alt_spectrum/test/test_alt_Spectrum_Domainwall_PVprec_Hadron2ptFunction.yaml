# Hadron 2pt function (and propagator convergence study) solved through the
# Pauli-Villars + site-diagonal preconditioned Moebius domain-wall operator
#     A = (D_PV C_PV^{-1})^dagger C^{-1} D
# (Kanamori, Chen, Matsufuru, PoS(LATTICE2024)414), via GMRES(m) on A.

Test_Spectrum:
  ## gauge_config_status = {Continue,Continue,Continue}
  gauge_config_status      : Continue
  ## gauge_config_type = {Text,Binary,ILDG,...}
  gauge_config_type_input  : Text
  config_filename_input    : ./conf_quench_12x12x12x12.txt
  random_number_type       : Mseries
  seed_for_random_number   : 1234567UL
  ## working precision of the GMRES-on-A solves = {double, float}
  precision                : double
  verbose_level            : General

Fopr:
  fermion_type            : Domainwall_PVprec
  kernel_type             : Wilson
  gamma_matrix_type       : Dirac
  quark_mass              : 0.005
  quark_mass_PauliVillars : 1.0
  domain_wall_height      : 1.0
  extent_of_5th_dimension : 8
  boundary_condition      : [1,1,1,-1]
  coefficient_b           : 1.5
  coefficient_c           : 0.5
  parameter_alpha         : 1.0
  verbose_level           : General

# Optional gauge link smearing applied before the solves.
# Set number_of_smearing : 0 (or smear_type : None) to disable.
Smearing:
  ## projection_type = {Stout_SU3, Maximum_SU_N}
  projection_type     : Stout_SU3
  ## smear_type = {APE, HYP, None}
  smear_type          : APE
  rho_uniform         : 0.1
  number_of_smearing  : 0
  verbose_level       : General

Source:
  ## source_type = {Local,Exponential,MomentumWall,Wall}
  source_type     : Local
  ## source_position = [x,y,z,t]
  source_position : [0,0,0,0]
  verbose_level   : General

Corr2pt_4spinor:
  filename_output : stdout
  verbose_level   : General
