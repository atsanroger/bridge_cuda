# FP (single precision) spectrum of the Pauli-Villars + site-diagonal
# preconditioned Moebius domain-wall operator:
#     A = (D_PV C_PV^{-1})^dagger C^{-1} D
# Target operator for multigrid, cf. Kanamori, Chen, Matsufuru,
# PoS(LATTICE2024)414.

Test_Eigensolver:
  ## field_type = {double_eo, float_eo, double, float}
  #field_type               : float_eo
  ## gauge_config_status = {Continue,Cold_start,Hot_start}
  gauge_config_status      : Continue
  ## gauge_config_type = {Text,Binary,Binary_Parallel,Fortran_JLQCD,Fortran_ILDG,ILDG,ILDG_Parallel}
  gauge_config_type_input  : Text
  config_filename_input    : ./conf_quench_16x16x16x16.txt
  random_number_type       : Mseries
  seed_for_random_number   : 1234567UL
  ## verbose_level = {Crucial,General,Detailed,Paranoiac}
  verbose_level            : General
#  expected_result          : 4.24209447645414e-01 # 16x8x8x16 ok
#  expected_result          : 4.22357801893693e-01 # 32x8x8x8 ok
  expected_result          : 4.58304049059966e-01 # 32x8x8x12 ok
#  expected_result          : 4.24278539207859e-01 # 32x8x8x16 ok
#  expected_result          : 4.23618364401005e-01  # 32x16x16x16 ok
#  test in, b=1.5, c=0.5, mq = 0.1 , M0 = 1.6 without smearing 

Smearing:
  ## projection_type = {Maximum_SU_N,Stout_SU3}
  projection_type : Stout_SU3
  ## smear_type = {APE,HYP}
  smear_type    : APE
  rho_uniform   : 0.1
  #smear_type    : HYP
  #alpha1        : 0.95
  #alpha2        : 0.76
  #alpha3        : 0.38
  number_of_smearing  : 0
  ## verbose_level = {Crucial,General,Detailed,Paranoiac}
  verbose_level : General

Fopr:
  fermion_type            : Domainwall_PVprec
  kernel_type             : Wilson
  gamma_matrix_type       : Dirac
  quark_mass              : 0.01
  quark_mass_PauliVillars : 1.0
  domain_wall_height      : 1.0
  extent_of_5th_dimension : 8
  boundary_condition      : [1,1,1,-1]
  coefficient_b           : 1.5
  coefficient_c           : 0.5
  verbose_level           : General

Eigensolver:
  eigensolver_type               : IRArnoldi
  fermion_mult_mode              : D
  eigensolver_mode               : abs_descending
  number_of_wanted_eigenvectors  : 8
  number_of_working_eigenvectors : 40
  convergence_criterion_squared  : 1.0e-6
  maximum_number_of_iteration    : 120
  threshold_value                : 1.0
  verbose_level                  : Detailed

GaugeFixing:
  ## gauge_fixing_type = {Coulomb,Landau,None}
#  gauge_fixing_type             : Coulomb
  gauge_fixing_type             : None
  maximum_number_of_iteration   : 5000
  number_of_naive_iteration     : 50
  interval_of_measurement       : 10
  iteration_to_reset            : 1000
  convergence_criterion_squared : 1.0e-24
  overrelaxation_parameter      : 1.6
  ## verbose_level = {Crucial,General,Detailed,Paranoiac}
  verbose_level                 : General
