# run config for the FP Domainwall_PVprec spectrum study on a 16^4 lattice

Main:
  ## lattice_size = [Lx, Ly, Lz, Lt]
  lattice_size             : [16,16,16,16]
  grid_size                : [1,1,1,1]
  number_of_thread         : 1
  device_number_offset     : 0
  number_of_color          : 3
  log_filename             : stdout
  ildg_log_filename        : stdout
  ## verbose_level = {Crucial,General,Detailed,Paranoiac}
  verbose_level            : General
